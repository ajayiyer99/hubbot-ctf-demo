name: Deploy to GitHub Pages

# NOTE (2026-07-07): This repo's default Actions GITHUB_TOKEN is read-only, so the
# automatic "Configure Pages" (enablement) call fails with
#   "Create Pages site failed. Error: Resource not accessible by integration"
# and the same cap would likely block the deploy step too.
#
# RECOMMENDED enablement is therefore the token-free "Deploy from a branch" path:
#   Settings -> Pages -> Build and deployment -> Source: "Deploy from a branch"
#   -> Branch: main  /  folder: / (root)  -> Save
# That uses GitHub's built-in pages builder (no Actions token needed) and serves
# index.html (+ .nojekyll) directly at https://ajayiyer99.github.io/hubbot-ctf-demo/
#
# This Actions workflow is kept only as an OPTIONAL path for accounts whose
# workflow token permits Pages writes. It is manual-only (workflow_dispatch) so it
# no longer auto-fails on every push. To use it: set Settings -> Pages -> Source:
# "GitHub Actions", ensure Settings -> Actions -> General -> Workflow permissions is
# "Read and write", then run this workflow from the Actions tab.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
